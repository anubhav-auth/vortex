services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: vortex_user
      POSTGRES_PASSWORD: vortex_password
      POSTGRES_DB: vortex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vortex_user -d vortex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://vortex_user:vortex_password@db:5432/vortex_db?schema=public
      ACCESS_TOKEN_SECRET: vortex_access_secret_2026
      REFRESH_TOKEN_SECRET: vortex_refresh_secret_2026
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
