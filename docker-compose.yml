services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: vortex_user
      POSTGRES_PASSWORD: vortex_password
      POSTGRES_DB: vortex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vortex_user -d vortex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
      DATABASE_URL: postgresql://vortex_user:vortex_password@db:5432/vortex_db?schema=public
      ACCESS_TOKEN_SECRET: vortex-access-secret-2026-please-rotate-32chars-min
      ACCESS_TOKEN_EXPIRY: 2h
      BCRYPT_ROUNDS: 12
      CORS_ORIGIN: http://localhost,http://localhost:80,http://localhost:5173,http://127.0.0.1
      ADMIN_SEED_EMAIL: admin@vortex.local
      ADMIN_SEED_PASSWORD: admin1234
      JURY_SEED_PASSWORD: jury1234
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
