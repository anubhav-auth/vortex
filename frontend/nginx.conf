server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip a few common text types
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml text/javascript image/svg+xml;
  gzip_min_length 256;

  # API + socket.io proxied to the backend container on the compose network.
  # Lets the frontend use relative URLs (VITE_API_URL='') so the same build
  # works in dev (vite proxy) and prod (nginx proxy).

  location /api/ {
    proxy_pass         http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /socket.io/ {
    proxy_pass         http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade     $http_upgrade;
    proxy_set_header   Connection  "upgrade";
    proxy_set_header   Host        $host;
    proxy_read_timeout 3600s;
  }

  # SPA fallback — serves index.html for any unknown path so client-side
  # routing works on direct loads / refreshes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
